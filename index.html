<!DOCTYPE html>
<html>
<head>
  <title>TradeEx</title>
</head>
<body>

<h2>Welcome to TradeEx</h2>

<!-- SIGN UP -->
<h3>Sign Up</h3>
<input type="text" id="signup-username" placeholder="Username"><br><br>
<input type="email" id="signup-email" placeholder="Email"><br><br>
<input type="password" id="signup-password" placeholder="Password"><br><br>
<button onclick="signUp()">Sign Up</button>

<hr>

<!-- LOGIN -->
<h3>Login</h3>
<input type="email" id="login-email" placeholder="Email"><br><br>
<input type="password" id="login-password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<p id="message"></p>

<!-- Firebase SDK (OLD COMPAT VERSION - EASY) -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

<script>
  // 🔴 APNI FIREBASE CONFIG YAHA PASTE KARO
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // SIGN UP
  function signUp() {
    let username = document.getElementById("signup-username").value;
    let email = document.getElementById("signup-email").value;
    let password = document.getElementById("signup-password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("message").innerText = "Signup Successful!";
      })
      .catch((error) => {
        document.getElementById("message").innerText = error.message;
      });
  }

  // LOGIN
  function login() {
    let email = document.getElementById("login-email").value;
    let password = document.getElementById("login-password").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        document.getElementById("message").innerText = "Login Successful!";
      })
      .catch((error) => {
        document.getElementById("message").innerText = error.message;
      });
  }
</script>

</body>
</html>
