<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeEx Demo Exchange</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.box{
  width:92%;
  max-width:420px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px orange;
  margin-top:15px;
}

input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

button{
  background:orange;
  font-weight:bold;
  cursor:pointer;
}

#loginBox,#dashboard,#adminBox,#depositBox{
  display:none;
}

.chart{
  width:100%;
  height:240px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<h2 style="color:orange;">TradeEx DEMO</h2>

<!-- SIGNUP -->
<div id="signupBox">
  <input id="su_email" placeholder="Email">
  <input id="su_pass" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="showLogin()">Go Login</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="li_email" placeholder="Email">
  <input id="li_pass" type="password">
  <button onclick="login()">Login</button>
  <button onclick="showSignup()">Go Signup</button>
</div>

<p id="msg"></p>

<!-- DASHBOARD -->
<div id="dashboard">

<h3>Balance: $<span id="bal">0</span></h3>

<button onclick="openDeposit()">Add Funds</button>
<button onclick="openAdmin()">Admin Panel</button>

<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>

<iframe id="chart"
class="chart"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15">
</iframe>

</div>

<!-- DEPOSIT -->
<div id="depositBox">

<h3>Deposit USDT (TRC20)</h3>

<p id="wallet">TXYZ123456789TRC20WALLET</p>

<img id="qr" width="180">

<button onclick="copyWallet()">Copy</button>
<button onclick="closeDeposit()">Close</button>

</div>

<!-- ADMIN -->
<div id="adminBox">

<h3>Admin Panel</h3>

<input id="amt" type="number" placeholder="Amount">

<button onclick="addBalance()">Increase Balance</button>
<button onclick="minusBalance()">Decrease Balance</button>

<button onclick="closeAdmin()">Close</button>

</div>

</div>

<script>

// ================= USERS SYSTEM =================
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

// ================= SIGNUP =================
function signup(){

  let email = su_email.value;
  let pass = su_pass.value;

  if(!email || !pass){
    alert("Fill all fields ❌");
    return;
  }

  let exists = users.find(u => u.email === email);

  if(exists){
    alert("Email already exists ❌");
    return;
  }

  users.push({
    email: email,
    pass: pass,
    balance: 1000
  });

  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup Success ✅");
  showLogin();
}

// ================= LOGIN =================
function login(){

  let email = li_email.value;
  let pass = li_pass.value;

  let user = users.find(u => u.email === email && u.pass === pass);

  if(user){

    currentUser = user;
    localStorage.setItem("currentUser", JSON.stringify(user));

    signupBox.style.display="none";
    loginBox.style.display="none";
    dashboard.style.display="block";

    bal.innerText = user.balance;

    msg.innerText = "Login Success ✅";

  }else{
    alert("Invalid login ❌");
  }
}

// ================= UI =================
function showLogin(){
  signupBox.style.display="none";
  loginBox.style.display="block";
}

function showSignup(){
  signupBox.style.display="block";
  loginBox.style.display="none";
}

// ================= CHART =================
function setCoin(c){
  chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+c+"&interval=15";
}

// ================= DEPOSIT =================
let wallet="TXYZ123456789TRC20WALLET";

function openDeposit(){
  depositBox.style.display="block";
  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+wallet;
}

function closeDeposit(){
  depositBox.style.display="none";
}

function copyWallet(){
  navigator.clipboard.writeText(wallet);
  alert("Copied ✅");
}

// ================= ADMIN =================
function openAdmin(){
  adminBox.style.display="block";
}

function closeAdmin(){
  adminBox.style.display="none";
}

// UPDATE USERS AFTER CHANGE
function saveUsers(){
  localStorage.setItem("users", JSON.stringify(users));
}

// INCREASE
function addBalance(){
  let amt = Number(amt.value);

  currentUser.balance += amt;

  bal.innerText = currentUser.balance;

  updateUser();
  alert("Balance Added ✅");
}

// DECREASE
function minusBalance(){
  let amt = Number(amt.value);

  if(amt > currentUser.balance){
    alert("Not enough balance ❌");
    return;
  }

  currentUser.balance -= amt;

  bal.innerText = currentUser.balance;

  updateUser();
  alert("Balance Deducted ✅");
}

// UPDATE CURRENT USER IN ARRAY
function updateUser(){

  let index = users.findIndex(u => u.email === currentUser.email);

  if(index !== -1){
    users[index] = currentUser;
    saveUsers();
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
  }
}

</script>

</body>
</html>
