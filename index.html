<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeEx Demo</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.box{
  width:92%;
  max-width:420px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px orange;
  margin-top:15px;
}

input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
}

button{
  background:orange;
  font-weight:bold;
  cursor:pointer;
}

#loginBox,#dashboard,#adminBox,#depositBox{
  display:none;
}

.chart{
  width:100%;
  height:250px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h2 style="color:orange;">TradeEx DEMO</h2>

<!-- SIGNUP -->
<div id="signupBox">
  <input id="su_email" placeholder="Email">
  <input id="su_pass" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="showLogin()">Login</button>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="li_email" placeholder="Email">
  <input id="li_pass" type="password">
  <button onclick="login()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<p id="msg"></p>

<!-- DASHBOARD -->
<div id="dashboard">

<h3>Balance: $<span id="bal">1000</span></h3>

<button onclick="openDeposit()">Add Funds</button>
<button onclick="openAdmin()">Admin Panel</button>

<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>

<iframe id="chart"
class="chart"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15"></iframe>

</div>

<!-- DEPOSIT -->
<div id="depositBox">
<h3>Deposit USDT (TRC20)</h3>

<p id="wallet">TXYZ123456789TRC20</p>

<img id="qr" width="200">

<button onclick="copyWallet()">Copy</button>
<button onclick="closeDeposit()">Close</button>
</div>

<!-- ADMIN -->
<div id="adminBox">

<h3>Admin Panel (Demo)</h3>

<input id="amt" type="number" placeholder="Amount">

<button onclick="addBal()">Increase</button>
<button onclick="minusBal()">Decrease</button>

<button onclick="closeAdmin()">Close</button>

</div>

</div>

<script>
// ================= LOCAL STORAGE AUTH =================
function signup(){
  localStorage.setItem("user", JSON.stringify({
    email:su_email.value,
    pass:su_pass.value,
    balance:1000
  }));
  alert("Signup Done");
}

function login(){
  let u = JSON.parse(localStorage.getItem("user"));

  if(u && u.email==li_email.value && u.pass==li_pass.value){
    signupBox.style.display="none";
    loginBox.style.display="none";
    dashboard.style.display="block";

    bal.innerText = u.balance;
  }else{
    alert("Wrong login ❌");
  }
}

// ================= UI =================
function showLogin(){
  signupBox.style.display="none";
  loginBox.style.display="block";
}

function showSignup(){
  signupBox.style.display="block";
  loginBox.style.display="none";
}

// ================= CHART =================
function setCoin(c){
  chart.src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+c+"&interval=15";
}

// ================= DEPOSIT =================
let wallet="TXYZ123456789TRC20";

function openDeposit(){
  depositBox.style.display="block";
  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+wallet;
}

function closeDeposit(){
  depositBox.style.display="none";
}

function copyWallet(){
  navigator.clipboard.writeText(wallet);
  alert("Copied");
}

// ================= ADMIN =================
let balance = 1000;

function openAdmin(){
  adminBox.style.display="block";
}

function closeAdmin(){
  adminBox.style.display="none";
}

function addBal(){
  balance += Number(amt.value);
  bal.innerText = balance;
}

function minusBal(){
  balance -= Number(amt.value);
  bal.innerText = balance;
}
</script>

</body>
</html>
