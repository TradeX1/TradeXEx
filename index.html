<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeEx App</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.page{display:none; padding:10px;}
.active{display:block;}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111;
}

.bottom button{
  flex:1;
  padding:15px;
  border:none;
  background:#222;
  color:white;
}

.bottom button:hover{
  background:orange;
}

.card{
  background:#111;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

button{
  background:orange;
  border:none;
  padding:8px;
  margin:5px;
  width:45%;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<h2>Dashboard</h2>

<h3>Balance: $<span id="bal">1000</span></h3>

<div class="card">

<h4>Add Funds</h4>
<button onclick="openDeposit()">Deposit</button>

<div id="depositBox" style="display:none">
<p id="wallet">TXYZ123456789TRC20</p>

<img id="qr" width="180">

<br>
<button onclick="copyWallet()">Copy</button>
</div>

</div>

</div>

<!-- MARKET -->
<div id="market" class="page">

<h2>Market</h2>

<div class="card">
<h4>BTC</h4>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15" height="200"></iframe>
<br>
<button onclick="trade('BTC')">Buy</button>
<button onclick="trade('BTC')">Sell</button>
</div>

<div class="card">
<h4>ETH</h4>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=15" height="200"></iframe>
<br>
<button onclick="trade('ETH')">Buy</button>
<button onclick="trade('ETH')">Sell</button>
</div>

<div class="card">
<h4>BNB</h4>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BNBUSDT&interval=15" height="200"></iframe>
<br>
<button onclick="trade('BNB')">Buy</button>
<button onclick="trade('BNB')">Sell</button>
</div>

</div>

<!-- ASSETS -->
<div id="asset" class="page">

<h2>Assets</h2>

<h3>Balance: $<span id="bal2">1000</span></h3>

<button onclick="withdraw()">Withdraw</button>

</div>

<!-- SUPPORT -->
<div id="support" class="page">

<h2>Support</h2>

<input id="msg" placeholder="Message">
<button onclick="send()">Send</button>

<p id="res"></p>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">

<button onclick="show('home')">Home</button>
<button onclick="show('market')">Market</button>
<button onclick="show('asset')">Asset</button>
<button onclick="show('support')">Support</button>

</div>

<script>

let balance = 1000;

// ================= NAV =================
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

// ================= DEPOSIT =================
const wallet="TXYZ123456789TRC20";

function openDeposit(){
  depositBox.style.display="block";

  qr.src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data="+wallet;
}

function copyWallet(){
  navigator.clipboard.writeText(wallet);
  alert("Copied ✅");
}

// ================= TRADE =================
function trade(c){
  alert(c+" Trade Opened (Demo)");
}

// ================= WITHDRAW =================
function withdraw(){

  if(balance <= 0){
    alert("First add funds ❌ Contact support");
    return;
  }

  let amt = prompt("Enter withdraw amount");

  if(amt > balance){
    alert("Low balance ❌");
    return;
  }

  balance -= amt;

  bal.innerText = balance;
  bal2.innerText = balance;

  alert("Withdraw request sent ✅");
}

// ================= SUPPORT =================
function send(){
  let m = msg.value;

  if(balance <= 0){
    res.innerText="Contact customer support ❌";
  }else{
    res.innerText="Message sent ✅";
  }
}

</script>

</body>
</html>
