<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeEx Exchange</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  text-align:center;
}

.box{
  width:92%;
  max-width:420px;
  margin:auto;
  background:#111;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px orange;
  margin-top:15px;
}

input,button{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
}

button{
  background:orange;
  font-weight:bold;
  cursor:pointer;
}

#loginBox{display:none;}
#dashboard{display:none;}

.chart{
  width:100%;
  height:260px;
  border-radius:10px;
}

#depositBox,#adminBox{
  display:none;
  background:#000;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h2 style="color:orange;">TradeEx Exchange</h2>

<!-- AUTH -->
<div id="signupBox">
  <input id="email1" placeholder="Email">
  <input id="pass1" type="password" placeholder="Password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="showLogin()">Login</button>
</div>

<div id="loginBox">
  <input id="email2" placeholder="Email">
  <input id="pass2" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<p id="msg"></p>

<!-- DASHBOARD -->
<div id="dashboard">

<h3>Balance: $<span id="balance">1000</span></h3>

<button onclick="openDeposit()">Add Funds</button>
<button onclick="openAdmin()">Admin Panel</button>

<!-- COIN CHART -->
<div class="nav">
<button onclick="setCoin('BTCUSDT')">BTC</button>
<button onclick="setCoin('ETHUSDT')">ETH</button>
<button onclick="setCoin('BNBUSDT')">BNB</button>
</div>

<iframe id="chart"
class="chart"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15"></iframe>

</div>

<!-- ADD FUNDS -->
<div id="depositBox">
<h3>Deposit USDT (TRC20)</h3>

<p id="wallet">TXYZ123456789TRC20WALLET</p>

<button onclick="copyWallet()">Copy Wallet</button>

<br><br>

<img id="qr" width="200">

<br><br>

<button onclick="closeDeposit()">Close</button>
</div>

<!-- ADMIN -->
<div id="adminBox">

<h3>Admin Panel</h3>

<input id="amount" type="number" placeholder="Amount">

<button onclick="addBalance()">Increase Balance</button>
<button onclick="minusBalance()">Decrease Balance</button>

<button onclick="closeAdmin()">Close</button>

</div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let balance = 1000;
const wallet = "TXYZ123456789TRC20WALLET";

// ================= SIGNUP =================
window.signup = async () => {
  try{
    await createUserWithEmailAndPassword(auth,email1.value,pass1.value);
    msg.innerText="Signup Success ✅";
    showLogin();
  }catch(e){
    msg.innerText=e.message;
  }
}

// ================= LOGIN =================
window.login = async () => {
  try{
    await signInWithEmailAndPassword(auth,email2.value,pass2.value);
    msg.innerText="Login Success ✅";

    signupBox.style.display="none";
    loginBox.style.display="none";
    dashboard.style.display="block";

  }catch(e){
    msg.innerText=e.message;
  }
}

// ================= UI =================
window.showLogin=()=>{
  signupBox.style.display="none";
  loginBox.style.display="block";
}

window.showSignup=()=>{
  signupBox.style.display="block";
  loginBox.style.display="none";
}

// ================= CHART =================
window.setCoin=(coin)=>{
  document.getElementById("chart").src=
  "https://s.tradingview.com/widgetembed/?symbol=BINANCE:"+coin+"&interval=15";
}

// ================= DEPOSIT =================
window.openDeposit=()=>{
  depositBox.style.display="block";

  document.getElementById("qr").src=
  "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data="+wallet;
}

window.closeDeposit=()=>{
  depositBox.style.display="none";
}

window.copyWallet=()=>{
  navigator.clipboard.writeText(wallet);
  alert("Copied ✅");
}

// ================= ADMIN =================
window.openAdmin=()=>{
  adminBox.style.display="block";
}

window.closeAdmin=()=>{
  adminBox.style.display="none";
}

// INCREASE
window.addBalance=()=>{
  let amt=Number(amount.value);
  balance += amt;
  document.getElementById("balance").innerText=balance;
  alert("Balance Increased ✅");
}

// DECREASE
window.minusBalance=()=>{
  let amt=Number(amount.value);

  if(amt>balance){
    alert("Not enough balance ❌");
    return;
  }

  balance -= amt;
  document.getElementById("balance").innerText=balance;
  alert("Balance Decreased ✅");
}

</script>

</body>
</html>
