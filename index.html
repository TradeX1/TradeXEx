<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP TradeEx</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f14;
  color:white;
}

/* AUTH */
.auth{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  width:90%;
  max-width:350px;
  background:#121823;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px #000;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
  background:#1c2533;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:none;
  border-radius:6px;
  background:orange;
  font-weight:bold;
}

/* APP */
.page{display:none;padding:10px;}
.active{display:block;}

/* TOP BAR */
.top{
  padding:10px;
  background:#111827;
  text-align:left;
}

/* CARDS */
.card{
  background:#121823;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#111827;
}

.bottom button{
  flex:1;
  background:none;
  color:white;
  padding:15px;
  border:none;
}

.bottom button:hover{
  background:#1f2937;
}
</style>
</head>

<body>

<!-- ================= AUTH ================= -->
<div id="auth" class="auth">

<div class="box" id="signupBox">
<h3>Sign Up</h3>
<input id="su_email" placeholder="Email">
<input id="su_pass" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
<p onclick="showLogin()" style="color:orange;cursor:pointer;">Already have account? Login</p>
</div>

<div class="box" id="loginBox" style="display:none">
<h3>Login</h3>
<input id="li_email" placeholder="Email">
<input id="li_pass" type="password">
<button onclick="login()">Login</button>
<p onclick="showSignup()" style="color:orange;cursor:pointer;">Create account</p>
</div>

</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none">

<div class="top">
<h3>VIP TradeEx</h3>
<p>Balance: $<span id="balance">0</span></p>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h3>Add Funds</h3>
<p id="wallet">TXYZ123456789TRC20</p>

<img id="qr" width="150">

<button onclick="copyWallet()">Copy Wallet</button>
</div>

</div>

<!-- MARKET -->
<div id="market" class="page">

<div class="card">
<h3>BTC/USDT</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15" height="200"></iframe>
</div>

<div class="card">
<h3>ETH/USDT</h3>
<iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:ETHUSDT&interval=15" height="200"></iframe>
</div>

</div>

<!-- ASSETS -->
<div id="asset" class="page">

<div class="card">
<h3>Your Assets</h3>
<p>Balance: $<span id="bal2">0</span></p>

<button onclick="withdraw()">Withdraw</button>
</div>

</div>

<!-- SUPPORT -->
<div id="support" class="page">

<div class="card">
<h3>Support</h3>
<input id="msg" placeholder="Message">
<button onclick="sendMsg()">Send</button>
<p id="res"></p>
</div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom">

<button onclick="show('home')">Home</button>
<button onclick="show('market')">Market</button>
<button onclick="show('asset')">Assets</button>
<button onclick="show('support')">Support</button>

</div>

</div>

<script>

// USERS
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = null;

// ================= SIGNUP =================
function signup(){

  let email = su_email.value;
  let pass = su_pass.value;

  if(users.find(u=>u.email===email)){
    alert("Email already exists ❌");
    return;
  }

  users.push({
    email,
    pass,
    balance:0   // ⭐ DEFAULT 0 BALANCE
  });

  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup Success ✅ Login now");
  showLogin();
}

// ================= LOGIN =================
function login(){

  let email = li_email.value;
  let pass = li_pass.value;

  let user = users.find(u=>u.email===email && u.pass===pass);

  if(!user){
    alert("Wrong login ❌");
    return;
  }

  currentUser = user;

  document.getElementById("auth").style.display="none";
  document.getElementById("app").style.display="block";

  updateUI();
}

// ================= UI =================
function updateUI(){
  balance.innerText = currentUser.balance;
  bal2.innerText = currentUser.balance;

  qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data="+wallet;
}

// ================= NAV =================
function show(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
}

// ================= SWITCH AUTH =================
function showLogin(){
  signupBox.style.display="none";
  loginBox.style.display="block";
}

function showSignup(){
  signupBox.style.display="block";
  loginBox.style.display="none";
}

// ================= WALLET =================
const wallet="TXYZ123456789TRC20";

function copyWallet(){
  navigator.clipboard.writeText(wallet);
  alert("Copied ✅");
}

// ================= WITHDRAW =================
function withdraw(){

  if(currentUser.balance<=0){
    alert("Balance 0 ❌ Contact support");
    return;
  }

  let amt = prompt("Enter amount");

  if(amt > currentUser.balance){
    alert("Low balance ❌");
    return;
  }

  currentUser.balance -= Number(amt);

  updateUser();
  updateUI();

  alert("Withdraw request sent");
}

// ================= SUPPORT =================
function sendMsg(){
  if(currentUser.balance<=0){
    res.innerText="Contact support ❌";
  }else{
    res.innerText="Message sent ✅";
  }
}

// SAVE USER
function updateUser(){
  let i = users.findIndex(u=>u.email===currentUser.email);
  users[i]=currentUser;
  localStorage.setItem("users", JSON.stringify(users));
}

</script>

</body>
</html>
